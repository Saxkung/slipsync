name = "slipsync-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[env.production]
name = "slipsync-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "slipsync"
database_id = "592b23e3-0bf8-40a3-8a5c-26d2c71ac37a"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "slipsync"

[vars]
GOOGLE_CLIENT_ID = "<your-google-client-id>"

# Secrets (set via wrangler secrets)
# GOOGLE_CLIENT_SECRET
# AUTH_SECRET
